<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- bag knot -->
  <rect x="12" y="4" width="8" height="5" rx="2.5" fill="#4a7c59"/>
  <!-- knot highlight -->
  <ellipse cx="16" cy="9" rx="5" ry="2" fill="#33673b"/>
  <!-- bag body -->
  <ellipse cx="16" cy="20" rx="11" ry="10" fill="#f59e0b"/>
  <!-- bag shading -->
  <ellipse cx="13" cy="17" rx="4" ry="5" fill="#fcd34d" opacity="0.5"/>
  <!-- dollar sign -->
  <text x="16" y="25" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#0f1e2a">$</text>
</svg>
